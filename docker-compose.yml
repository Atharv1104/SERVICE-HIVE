version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crm-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - crm-network

  backend:
    build: ./backend
    container_name: crm-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/service-hive-crm
      - JWT_SECRET=supersecretjwtkey_12345
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - crm-network

  frontend:
    build: ./frontend
    container_name: crm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  mongodb_data:
